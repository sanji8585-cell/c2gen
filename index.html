<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>C2 GEN - AI Content Studio</title>
    <link rel="stylesheet" href="/theme.css">
  </head>
  <body class="antialiased min-h-screen" style="background-color: var(--bg-base); color: var(--text-primary);">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
    <script>
      // CDN scripts + Tailwind config (loaded after app)
      (function() {
        var s = document.createElement('script');
        s.src = 'https://cdn.tailwindcss.com';
        s.onload = function() {
          if (typeof tailwind !== 'undefined') {
            tailwind.config = {
              darkMode: 'class',
              theme: { extend: { colors: { brand: { 50:'#f0f9ff',100:'#e0f2fe',500:'#0ea5e9',600:'#0284c7',900:'#0c4a6e' }}}}
            };
          }
        };
        document.head.appendChild(s);
        ['https://accounts.google.com/gsi/client','https://t1.kakaocdn.net/kakao_js_sdk/2.7.4/kakao.min.js'].forEach(function(u){var t=document.createElement('script');t.src=u;t.async=true;document.head.appendChild(t);});
        // 테마 초기화
        var saved = localStorage.getItem('tubegen_theme');
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (saved === 'dark' || (!saved && prefersDark)) document.documentElement.classList.add('dark');
      })();
    </script>
  </body>
</html>
